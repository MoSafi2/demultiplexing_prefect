# Bracken `-w` reports omit the leading "unclassified" row Kraken uses; MultiQC's
# default kraken pattern expects that row on line 1, so it skips `.bracken.report`.
# A single matching line is enough to identify Kraken/Bracken report files here.
sp:
  kraken:
    contents_re: '^\s{0,2}(\d{1,3}\.\d{1,2})\t(\d+)\t(\d+)\t((\d+)\t(\d+)\t)?([URDKPCOFGS-]\d{0,2}|R\d+)\t(\d+)(\s+)\S'
    num_lines: 1
