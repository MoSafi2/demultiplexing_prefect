[workspace]
authors = ["prefect-qc"]
channels = ["conda-forge", "bioconda"]
name = "prefect-qc"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = "*"
fastqc = "*"
fastp = "*"
falco = "*"
multiqc = { version = "*", channel = "bioconda" }
pytest = "*"
fastq-screen = ">=0.16.0,<0.17"
kraken2 = { version = ">=2.17.1,<3", channel = "bioconda" }
bracken = { version = ">=3.1,<4", channel = "bioconda" }
bowtie2 = { version = ">=2.5,<3", channel = "bioconda" }

[pypi-dependencies]
prefect = "*"
